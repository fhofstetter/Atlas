global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: atlas-webapp
    static_configs:
      - targets: ['atlas-webapp:3456']
    metrics_path: /metrics

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://atlas-webapp:3456/
          - http://atlas-webapp:3456/training
          - http://atlas-webapp:3456/organizer
          - http://atlas-webapp:3456/budget
          - http://atlas-webapp:3456/agents
          - http://atlas-webapp:3456/tasks
          - http://atlas-webapp:3456/docs
          - http://atlas-webapp:3456/calendar
          - http://atlas-webapp:3456/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # cadvisor job removed — cAdvisor disabled (was causing WSL2 kernel panics)
