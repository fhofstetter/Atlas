name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/atlas-webapp/package-lock.json
      - run: npm ci
        working-directory: tools/atlas-webapp
      - run: npm run lint
        working-directory: tools/atlas-webapp

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build atlas-webapp image
        run: docker build -t atlas-webapp-test ./tools/atlas-webapp
