upstream atlas_app {
    server atlas-webapp:3456;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Health and metrics bypass maintenance check entirely
    location /api/health {
        proxy_pass http://atlas_app;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /metrics {
        proxy_pass http://atlas_app;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        # If maintenance flag file exists, return 503 → maintenance page
        if (-f /data/ops/maintenance.flag) {
            return 503;
        }

        proxy_pass http://atlas_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Intercept upstream errors: app down → starting page
        proxy_intercept_errors on;
        error_page 502 504 /starting.html;
        # 503 from the maintenance if-block above → maintenance page
        error_page 503 /maintenance.html;
    }

    location = /starting.html { internal; }
    location = /maintenance.html { internal; }
}
